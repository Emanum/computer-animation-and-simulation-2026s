name: Deploy Exercise 2 to GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: exercise2/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: exercise2
        run: npm ci

      - name: Build exercise 2 submission
        working-directory: exercise2
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/exercise2
          cp -R exercise2/dist-submission/. _site/exercise2/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
