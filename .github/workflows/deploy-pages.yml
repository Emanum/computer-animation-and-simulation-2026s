name: Deploy All Exercises to GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install and Build Exercise 1
        working-directory: exercise1
        run: |
          npm ci
          npm run build

      - name: Install and Build Exercise 2
        working-directory: exercise2
        run: |
          npm ci
          npm run build

      - name: Install and Build Exercise 3
        working-directory: exercise3
        run: |
          npm ci
          npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/exercise1
          cp -R exercise1/dist-submission/. _site/exercise1/
          
          mkdir -p _site/exercise2
          cp -R exercise2/dist-submission/. _site/exercise2/
          
          mkdir -p _site/exercise3
          cp -R exercise3/dist-submission/. _site/exercise3/
          
          # Optional: redirect or link page at the root for easier navigation
          echo '<!DOCTYPE html><html><head><title>Exercises</title></head><body><h1>Computer Animation & Simulation</h1><ul><li><a href="./exercise1/">Exercise 1</a></li><li><a href="./exercise2/">Exercise 2</a></li><li><a href="./exercise3/">Exercise 3</a></li></ul></body></html>' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
